<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Babylon.lite demos</title>
        <meta name="description" content="Standalone showcase demos built on Babylon Lite — a WebGPU-exclusive, tree-shakable, minimal-footprint rendering engine." />
        <style>
            :root {
                --bjs-red: #bb464b;
                --bjs-coral: #e0684b;
                --bjs-light: #e0ded8;
                --bjs-mid: #d5d2ca;
                --bjs-dark: #292929;
                --bg: #1b1718;
                --card-bg: #221d1e;
                --border: #3a3132;
                --text: #efe9e6;
                --muted: #b3a8a6;
            }
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html {
                scroll-behavior: smooth;
            }
            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                color: var(--text);
                background: var(--bg);
                min-height: 100vh;
                position: relative;
                overflow-x: hidden;
            }
            /* Dimmed Babylon logo as a background watermark */
            body::before {
                content: "";
                position: fixed;
                inset: 0;
                z-index: 0;
                background:
                    radial-gradient(1200px 800px at 50% -10%, rgba(187, 70, 75, 0.18), transparent 60%),
                    url("babylon-logo.svg") no-repeat center 42% / min(60vmin, 620px);
                opacity: 0.06;
                pointer-events: none;
            }
            .wrap {
                position: relative;
                z-index: 1;
                max-width: 1140px;
                margin: 0 auto;
                padding: 4rem 1.5rem 5rem;
            }
            header {
                text-align: center;
                margin-bottom: 3rem;
            }
            header .logo {
                width: 84px;
                height: 84px;
                margin: 0 auto 1.25rem;
                display: block;
            }
            header h1 {
                font-size: clamp(2rem, 5vw, 3rem);
                font-weight: 700;
                letter-spacing: -0.02em;
            }
            header h1 .dot {
                color: var(--bjs-coral);
            }
            header h1 .lite {
                background: linear-gradient(90deg, var(--bjs-coral), var(--bjs-red));
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
            }
            header p {
                margin-top: 0.9rem;
                color: var(--muted);
                font-size: 1.02rem;
                max-width: 46rem;
                margin-left: auto;
                margin-right: auto;
                line-height: 1.5;
            }
            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 1.5rem;
            }
            .card {
                display: flex;
                flex-direction: column;
                background: var(--card-bg);
                border: 1px solid var(--border);
                border-radius: 12px;
                overflow: hidden;
                text-decoration: none;
                color: inherit;
                transition:
                    transform 0.18s ease,
                    border-color 0.18s ease,
                    box-shadow 0.18s ease;
            }
            .card:hover {
                transform: translateY(-4px);
                border-color: var(--bjs-coral);
                box-shadow: 0 12px 30px -12px rgba(224, 104, 75, 0.55);
            }
            .card-image {
                aspect-ratio: 16 / 9;
                background: #0f0c0d;
                position: relative;
                overflow: hidden;
            }
            .card-image img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }
            .card-body {
                padding: 1.1rem 1.2rem 1.3rem;
                display: flex;
                flex-direction: column;
                gap: 0.55rem;
                flex: 1;
            }
            .card-body h2 {
                font-size: 1.15rem;
                font-weight: 650;
            }
            .card-body p {
                font-size: 0.85rem;
                line-height: 1.5;
                color: var(--muted);
                flex: 1;
            }
            .tags {
                display: flex;
                flex-wrap: wrap;
                gap: 0.4rem;
            }
            .tag {
                font-size: 0.68rem;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.04em;
                padding: 0.18rem 0.5rem;
                border-radius: 999px;
                background: rgba(187, 70, 75, 0.16);
                color: #e9a09f;
                border: 1px solid rgba(187, 70, 75, 0.35);
            }
            .size {
                margin-top: 0.2rem;
                font-size: 0.74rem;
                color: var(--bjs-mid);
                font-variant-numeric: tabular-nums;
            }
            .size strong {
                color: var(--bjs-coral);
                font-weight: 700;
            }
            footer {
                margin-top: 4rem;
                text-align: center;
                color: var(--muted);
                font-size: 0.82rem;
            }
            footer a {
                color: var(--bjs-coral);
                text-decoration: none;
            }
            footer a:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <header>
                <img class="logo" src="babylon-logo.svg" alt="Babylon logo" />
                <h1><span class="lite">Babylon.lite</span> <span class="dot">demos</span></h1>
                <p>
                    Standalone showcase pages built on Babylon&nbsp;Lite — a WebGPU-exclusive, fully tree-shakable rendering engine. Each demo is production-bundled, so the size it
                    actually ships is shown right on its card.
                </p>
            </header>
            <main class="grid">
                <!--CARDS-->
            </main>
            <footer>Built with <a href="https://github.com/BabylonJS/Babylon-Lite">Babylon&nbsp;Lite</a> · WebGPU only</footer>
        </div>
    </body>
</html>
